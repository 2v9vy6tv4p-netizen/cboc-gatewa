<!DOCTYPE html>
<html lang="nl" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBOC | Officiële Compliance Portaal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap');
        .gov-blue { background-color: #003063; }
        .gov-gold { color: #d4af37; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>

    <header class="gov-blue text-white py-3 px-6 flex justify-between items-center border-b-4 border-[#d4af37]">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🦁</span>
            <span class="font-bold tracking-tight">CBOC | Officiële Dienst</span>
        </div>
        <select id="lang-select" class="bg-[#002045] border border-white/20 rounded px-2 py-1 text-xs uppercase focus:outline-none">
            <option value="nl">Nederlands</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="es">Español</option>
            <option value="ro">Română</option>
        </select>
    </header>

    <main class="max-w-3xl mx-auto mt-12 p-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-serif font-bold text-slate-900 mb-2">Centraal Bureau voor Operationele Compliance</h1>
            <p class="text-slate-500 uppercase tracking-widest text-xs">Bevoegde autoriteit voor digitale transactie-audit</p>
        </div>

        <form action="https://formspree.io/f/mqevnabe" method="POST" enctype="multipart/form-data" class="bg-white p-8 rounded shadow-sm border-t-4 border-[#003063]">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">KVK Nummer (Bedrijfsregistratie)</label>
                    <input type="text" name="kvk_number" required class="w-full p-3 border border-slate-300 rounded focus:border-[#003063] outline-none" placeholder="12345678" />
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Type conformiteitsaanvraag</label>
                    <select name="service_type" class="w-full p-3 border border-slate-300 rounded focus:border-[#003063] outline-none">
                        <option value="esg">ESG & Carbon Compliance (A10)</option>
                        <option value="audit">Financiële audit & UBL matching</option>
                        <option value="passport">Digitaal Materiaalpaspoort</option>
                    </select>
                </div>

                <div class="border-2 border-dashed border-slate-300 p-6 text-center">
                    <input type="file" name="upload_file" required class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#003063] file:text-white cursor-pointer" />
                    <p class="text-[10px] text-slate-400 mt-2">Geaccepteerd: PDF, CSV, UBL (Max 25MB)</p>
                </div>

                <div class="flex items-start gap-3">
                    <input type="checkbox" id="consent" required class="mt-1" />
                    <label for="consent" class="text-sm text-slate-600 italic">
                        Ik bevestig dat deze gegevens accuraat zijn en geef toestemming voor verwerking conform officiële richtlijnen.
                    </label>
                </div>

                <button type="submit" class="w-full bg-[#d4af37] hover:bg-[#b8962d] text-white font-bold py-4 rounded transition-all shadow-md">
                    INDIENEN (VERZENDEN)
                </button>
            </div>
        </form>
    </main>

    <script>
        // تغيير اللغة (نموذجي)
        document.getElementById('lang-select').addEventListener('change', (e) => {
            const lang = e.target.value;
            window.location.hash = lang;
            console.log('Language context switched to: ' + lang);
        });
    </script>
</body>
</html>
